<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSCベリッシマ(5/4発) 天気予報パネル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .hidden-content { display: none; }
        /* スクロールバー非表示（タイムライン用） */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 pb-20">

    <header class="bg-blue-900 text-white p-6 shadow-md rounded-b-3xl">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <i class="ph ph-boat text-3xl text-blue-300"></i>
                    MSCベリッシマ
                </h1>
                <p class="text-blue-200 mt-1 text-sm sm:text-base">2026年5月4日出発 GWショートクルーズ (6泊7日)</p>
            </div>
            <div class="hidden sm:block text-right">
                <p class="text-sm text-blue-300">東京発着</p>
                <p class="font-semibold">済州島・八代・鹿児島</p>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 sm:p-6 mt-4">
        
        <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-6 gap-2">
            <h2 class="text-xl font-bold flex items-center gap-2 text-slate-700">
                <i class="ph-fill ph-map-pin text-2xl text-blue-600"></i>
                各寄港地の天気予報パネル
            </h2>
            <div id="lastUpdated" class="hidden-content flex items-center gap-1.5 text-sm text-slate-500 bg-white px-3 py-1.5 rounded-full shadow-sm border border-slate-200 w-fit">
                <i class="ph ph-clock text-blue-500"></i>
                <span id="updatedTimeText">更新日時: --</span>
            </div>
        </div>

        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-slate-500">気象データを取得中...</p>
        </div>

        <div id="weatherGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden-content">
            </div>

    </main>

    <footer class="mt-8 mb-4 px-4 text-center">
        <div class="flex flex-col items-center justify-center gap-3 mb-3">
            <span class="text-sm font-semibold text-slate-700">データ取得元を切り替え：</span>
            <div class="inline-flex rounded-lg shadow-sm" role="group">
                <button id="btn-open-meteo" onclick="changeSource('open-meteo')" class="px-4 py-2 text-sm font-medium border rounded-l-lg transition-colors bg-blue-600 text-white border-blue-600 z-10">
                    Open-Meteo
                </button>
                <button id="btn-jma" onclick="changeSource('jma')" class="px-4 py-2 text-sm font-medium border-t border-b border-r rounded-r-lg transition-colors bg-white text-slate-700 border-slate-200 hover:bg-slate-50">
                    気象庁 (JMA)
                </button>
            </div>
        </div>
        <p class="text-xs text-slate-500">
            ※気象庁データは時間ごとのタイムライン・波の予想に対応していません。
        </p>
    </footer>

    <script>
        // 旅程データ
        const itinerary = [
            { date: '2026-05-04', name: '東京 (出港)', type: 'embark', lat: 35.6267, lon: 139.7758, jmaAreaCode: '130000', time: '16:30' },
            { date: '2026-05-05', name: '終日航海', type: 'sea', lat: null, lon: null, jmaAreaCode: null, time: '-' },
            { date: '2026-05-06', name: '済州島 (韓国)', type: 'port', lat: 33.5135, lon: 126.5414, jmaAreaCode: null, time: '13:00 - 21:00' },
            { date: '2026-05-07', name: '八代 (熊本)', type: 'port', lat: 32.5074, lon: 130.6022, jmaAreaCode: '430000', time: '12:00 - 20:00' },
            { date: '2026-05-08', name: '鹿児島', type: 'port', lat: 31.5966, lon: 130.5571, jmaAreaCode: '460100', time: '08:00 - 18:00' },
            { date: '2026-05-09', name: '終日航海', type: 'sea', lat: null, lon: null, jmaAreaCode: null, time: '-' },
            { date: '2026-05-10', name: '東京 (入港)', type: 'debark', lat: 35.6267, lon: 139.7758, jmaAreaCode: '130000', time: '08:00' }
        ];

        let currentSource = 'open-meteo';

        function getOpenMeteoInfo(code) {
            if (code === 0) return { label: '快晴', icon: 'ph-fill ph-sun', color: 'text-orange-500' };
            if (code === 1 || code === 2 || code === 3) return { label: '晴れ/曇り', icon: 'ph-fill ph-cloud-sun', color: 'text-slate-500' };
            if (code === 45 || code === 48) return { label: '霧', icon: 'ph-fill ph-cloud-fog', color: 'text-slate-400' };
            if (code >= 51 && code <= 67) return { label: '雨', icon: 'ph-fill ph-cloud-rain', color: 'text-blue-500' };
            if (code >= 71 && code <= 82) return { label: '雪', icon: 'ph-fill ph-snowflake', color: 'text-blue-300' };
            if (code >= 95) return { label: '雷雨', icon: 'ph-fill ph-cloud-lightning', color: 'text-yellow-600' };
            return { label: '不明', icon: 'ph-fill ph-cloud', color: 'text-slate-400' };
        }

        function getJMAInfo(codeStr) {
            const code = parseInt(codeStr, 10);
            if (isNaN(code)) return { label: '不明', icon: 'ph-fill ph-cloud', color: 'text-slate-400' };
            if (code >= 100 && code < 200) {
                if (code === 100) return { label: '晴れ', icon: 'ph-fill ph-sun', color: 'text-orange-500' };
                if (code === 101 || code === 132) return { label: '晴時々曇', icon: 'ph-fill ph-cloud-sun', color: 'text-slate-500' };
                if (code >= 112 && code <= 114) return { label: '晴のち雨', icon: 'ph-fill ph-cloud-rain', color: 'text-blue-500' };
                return { label: '晴れ', icon: 'ph-fill ph-sun', color: 'text-orange-500' };
            }
            if (code >= 200 && code < 300) {
                if (code === 200) return { label: '曇り', icon: 'ph-fill ph-cloud', color: 'text-slate-400' };
                if (code === 201 || code === 231) return { label: '曇時々晴', icon: 'ph-fill ph-cloud-sun', color: 'text-slate-500' };
                if (code >= 212 && code <= 214) return { label: '曇のち雨', icon: 'ph-fill ph-cloud-rain', color: 'text-blue-500' };
                return { label: '曇り', icon: 'ph-fill ph-cloud', color: 'text-slate-400' };
            }
            if (code >= 300 && code < 400) return { label: '雨', icon: 'ph-fill ph-cloud-rain', color: 'text-blue-500' };
            if (code >= 400 && code < 500) return { label: '雪', icon: 'ph-fill ph-snowflake', color: 'text-blue-300' };
            return { label: '不明', icon: 'ph-fill ph-cloud', color: 'text-slate-400' };
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            return `${d.getMonth() + 1}月${d.getDate()}日(${days[d.getDay()]})`;
        }

        function changeSource(source) {
            currentSource = source;
            document.getElementById('btn-open-meteo').className = source === 'open-meteo' 
                ? "px-4 py-2 text-sm font-medium border rounded-l-lg transition-colors bg-blue-600 text-white border-blue-600 z-10" 
                : "px-4 py-2 text-sm font-medium border rounded-l-lg transition-colors bg-white text-slate-700 border-slate-200 hover:bg-slate-50";
            document.getElementById('btn-jma').className = source === 'jma' 
                ? "px-4 py-2 text-sm font-medium border-t border-b border-r rounded-r-lg transition-colors bg-blue-600 text-white border-blue-600 z-10" 
                : "px-4 py-2 text-sm font-medium border-t border-b border-r rounded-r-lg transition-colors bg-white text-slate-700 border-slate-200 hover:bg-slate-50";
            fetchWeather();
        }

        async function fetchWeather() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('weatherGrid').style.display = 'none';
            const grid = document.getElementById('weatherGrid');
            grid.innerHTML = '';

            try {
                for (const stop of itinerary) {
                    let item = { ...stop };
                    
                    if (item.type === 'sea') {
                        item.available = false;
                    } else if (currentSource === 'open-meteo') {
                        if (!item.lat) {
                            item.available = false; item.error = '位置情報なし';
                        } else {
                            // 陸の気象データを取得
                            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${item.lat}&longitude=${item.lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&hourly=temperature_2m,precipitation_probability,weather_code&timezone=Asia%2FTokyo&forecast_days=16`);
                            const data = await res.json();
                            const dateIndex = data.daily.time.findIndex(t => t === item.date);
                            
                            // 海の波データ（Marine API）を取得
                            let waveMax = '--';
                            try {
                                const mRes = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${item.lat}&longitude=${item.lon}&daily=wave_height_max&timezone=Asia%2FTokyo`);
                                if (mRes.ok) {
                                    const mData = await mRes.json();
                                    const mDateIndex = mData.daily.time.findIndex(t => t === item.date);
                                    if (mDateIndex !== -1 && mData.daily.wave_height_max[mDateIndex] !== null) {
                                        waveMax = mData.daily.wave_height_max[mDateIndex].toFixed(1);
                                    }
                                }
                            } catch (e) {
                                console.log('Marine data not available for this coordinate', e);
                            }

                            if (dateIndex !== -1) {
                                item.weatherCode = data.daily.weather_code[dateIndex];
                                item.maxTemp = Math.round(data.daily.temperature_2m_max[dateIndex]);
                                item.minTemp = Math.round(data.daily.temperature_2m_min[dateIndex]);
                                item.pop = data.daily.precipitation_probability_max[dateIndex];
                                item.waveMax = waveMax;
                                item.available = true;

                                // タイムライン用の時間帯データ抽出 (6, 9, 12, 15, 18, 21時)
                                item.timeline = [];
                                const targetHours = ['06:00', '09:00', '12:00', '15:00', '18:00', '21:00'];
                                data.hourly.time.forEach((t, i) => {
                                    if (t.startsWith(item.date)) {
                                        const hour = t.split('T')[1];
                                        if (targetHours.includes(hour)) {
                                            item.timeline.push({
                                                time: hour.slice(0, 5),
                                                temp: Math.round(data.hourly.temperature_2m[i]),
                                                pop: data.hourly.precipitation_probability[i],
                                                code: data.hourly.weather_code[i]
                                            });
                                        }
                                    }
                                });
                            } else {
                                item.available = false; item.error = '予報期間外';
                            }
                        }
                    } else {
                        // JMA (タイムライン・波高なし)
                        if (!item.jmaAreaCode) {
                            item.available = false; item.error = '日本国外のため取得不可';
                        } else {
                            const res = await fetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${item.jmaAreaCode}.json`);
                            const data = await res.json();
                            let wCode = null, min = '--', max = '--', pop = '--';
                            
                            data.forEach(report => {
                                report.timeSeries.forEach(ts => {
                                    const idx = ts.timeDefines.findIndex(t => t.startsWith(item.date));
                                    if (idx !== -1) {
                                        const area = ts.areas[0];
                                        if (area.weatherCodes && !wCode) wCode = area.weatherCodes[idx];
                                        if (area.tempsMin && area.tempsMin[idx] !== "") min = area.tempsMin[idx];
                                        if (area.tempsMax && area.tempsMax[idx] !== "") max = area.tempsMax[idx];
                                        if (area.pops && area.pops[idx] !== "") pop = area.pops[idx];
                                    }
                                });
                            });
                            
                            if (wCode) {
                                item.weatherCode = wCode;
                                item.maxTemp = max; item.minTemp = min;
                                item.pop = pop;
                                item.available = true;
                            } else {
                                item.available = false; item.error = '予報期間外 (発表前)';
                            }
                        }
                    }
                    renderPanel(item);
                }
                document.getElementById('updatedTimeText').innerText = `更新日時: ${new Date().toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}`;
            } catch (error) {
                grid.innerHTML = '<p class="text-red-500 col-span-full text-center">データの取得に失敗しました。再読み込みしてください。</p>';
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('weatherGrid').style.display = 'grid';
                document.getElementById('lastUpdated').style.display = 'flex';
            }
        }

        function renderPanel(item) {
            const grid = document.getElementById('weatherGrid');
            const info = item.available ? (currentSource === 'open-meteo' ? getOpenMeteoInfo(item.weatherCode) : getJMAInfo(item.weatherCode)) : null;
            
            const typeBadge = item.type !== 'sea' ? `<span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full font-medium h-fit">${item.type === 'embark' ? '出港' : item.type === 'debark' ? '入港' : '寄港'}</span>` : '';
            const bgDecor = item.type === 'sea' ? `<div class="absolute -right-4 -top-4 opacity-5"><i class="ph-fill ph-anchor text-9xl"></i></div>` : '';
            
            let contentHtml = '';
            let timelineHtml = '';

            if (item.type === 'sea') {
                contentHtml = `<div class="flex items-center justify-center py-6 text-slate-400"><p>終日クルージング</p></div>`;
            } else if (item.available) {
                // Timeline Generation (Open-Meteo only)
                if (item.timeline && item.timeline.length > 0) {
                    const blocks = item.timeline.map(t => {
                        const tInfo = getOpenMeteoInfo(t.code);
                        return `
                            <div class="flex flex-col items-center min-w-[50px]">
                                <span class="text-[10px] text-slate-500 mb-1">${t.time}</span>
                                <i class="${tInfo.icon} text-2xl ${tInfo.color} mb-1"></i>
                                <span class="text-xs font-bold text-slate-700">${t.temp}°</span>
                                <span class="text-[10px] font-bold text-blue-500">${t.pop}%</span>
                            </div>
                        `;
                    }).join('');
                    
                    timelineHtml = `
                        <div class="mt-5 pt-4 border-t border-slate-100">
                            <div class="flex overflow-x-auto gap-3 pb-2 no-scrollbar">
                                ${blocks}
                            </div>
                        </div>
                    `;
                }

                // 波高バッジのHTML (Open-Meteoでデータがある場合のみ)
                const waveBadgeHtml = item.waveMax !== undefined ? `
                    <div class="flex items-center gap-1 text-sm font-bold text-cyan-600 bg-cyan-50 px-2 py-0.5 rounded w-fit">
                        <i class="ph-bold ph-waves"></i>
                        <span>${item.waveMax !== '--' ? item.waveMax + 'm' : '--m'}</span>
                    </div>
                ` : '';

                contentHtml = `
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col items-start gap-1">
                            <div class="flex items-center gap-3">
                                <i class="${info.icon} text-5xl ${info.color}"></i>
                                <div>
                                    <span class="block font-bold text-slate-700 text-lg">${info.label}</span>
                                    <div class="flex flex-wrap items-center gap-2 mt-1">
                                        <div class="flex items-center gap-1 text-sm font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded w-fit">
                                            <i class="ph-fill ph-drop"></i>
                                            <span>${item.pop !== '--' && item.pop !== undefined ? item.pop + '%' : '--%'}</span>
                                        </div>
                                        ${waveBadgeHtml}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-bold tracking-tighter">
                                <span class="text-red-500">${item.maxTemp}<span class="text-lg">°</span></span>
                                <span class="text-slate-300 mx-0.5 text-xl">/</span>
                                <span class="text-blue-500">${item.minTemp}<span class="text-lg">°</span></span>
                            </div>
                        </div>
                    </div>
                    ${timelineHtml}
                `;
            } else {
                contentHtml = `<div class="flex items-center justify-center py-6 text-slate-400"><p class="text-sm">データなし (${item.error})</p></div>`;
            }

            grid.insertAdjacentHTML('beforeend', `
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 hover:shadow-md transition-shadow relative overflow-hidden flex flex-col justify-between">
                    ${bgDecor}
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="text-sm font-semibold text-blue-600 mb-1">${formatDate(item.date)}</p>
                            <h3 class="text-lg font-bold text-slate-800">${item.name}</h3>
                        </div>
                        ${typeBadge}
                    </div>
                    <div class="mt-2 flex-grow flex flex-col justify-end">
                        ${contentHtml}
                    </div>
                </div>
            `);
        }

        window.addEventListener('DOMContentLoaded', fetchWeather);
    </script>
</body>
</html>
